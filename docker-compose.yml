services:
  db:
    image: postgres:15-alpine
    container_name: instajob_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: instajob_pass_2026
      POSTGRES_DB: instajob_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: instajob_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://postgres:instajob_pass_2026@db:5432/instajob_db"
      REDIS_URL: "redis://redis:6379"
      PORT: 3001
      NODE_ENV: development

  redis:
    image: redis:alpine
    container_name: instajob_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
